- title: Invisible Languages
  subtitle: Language vitality and digital representation
  group: featured
  image: images/photo.jpg
  link: https://theinvisiblelab.org
  description: Measures all 7,613 human languages on _vitality_ (socio-demographic strength) and _digitality_ (digital footprint across the web, Wikipedia, and AI resources), then computes a representation gap to identify languages in urgent need of attention in the age of LLMs.
  tags:
    - languages
    - NLP
    - AI

