- title: pictopercept
  image: images/pictopercept.gif
  link: https://pictopercept.ai
  description: Web application for running image-based forced-choice perception experiments at scale. Designed for researchers studying visual communication, media effects, and human judgment of visual information.
  repo: saurabh-khanna/pictopercept
  tags:
    - computer vision
    - bias

- title: popcoord
  image: images/popcoord.gif
  link: https://github.com/popcoord/popcoord
  description: Python package to query population counts, age/sex demographics, and density for any given coordinate and radius on Earth. Powered by WorldPop and JRC GHS-POP.
  repo: popcoord/popcoord
  tags:
    - geospatial
    - python

- title: facemeasure
  image: images/facemeasure.gif
  link: https://facemeasure.com
  description: Open-source tool for measuring facial landmarks, action units, and expressions in images at scale. Designed for researchers in computer vision, media psychology, and social science.
  repo: saurabh-khanna/facemeasure
  tags:
    - computer vision
    - research
