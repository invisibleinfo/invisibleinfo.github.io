- title: pictopercept
  image: images/pictopercept.gif
  link: https://pictopercept.ai
  description: Web platform for running image-based perception experiments at scale. Designed for researchers studying visual communication, media effects, and human judgment of AI-generated images.
  repo: saurabh-khanna/pictopercept
  tags:
